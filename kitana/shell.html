<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KITANA. — Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { margin: 0; padding: 0; background: #0F172A; font-family: 'Inter', sans-serif; }

        .sidebar { width: 240px; min-width: 240px; height: 100vh; background: #0F172A; display: flex; flex-direction: column; border-right: 1px solid #1E293B; position: fixed; left: 0; top: 0; z-index: 100; }
        .sidebar-logo { height: 64px; display: flex; align-items: center; padding: 0 24px; border-bottom: 1px solid #1E293B; }
        .sidebar-logo h1 { font-size: 1.25rem; font-weight: 900; letter-spacing: 0.2em; color: white; margin: 0; }
        .sidebar-logo span { color: #FF0056; }

        .nav-section { padding: 8px 12px 4px; font-size: 10px; font-weight: 700; color: #475569; text-transform: uppercase; letter-spacing: 0.1em; margin-top: 8px; }

        .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 20px; margin: 2px 8px; border-radius: 8px; color: #94A3B8; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; text-decoration: none; border: none; background: none; width: calc(100% - 16px); text-align: left; }
        .nav-item:hover { color: #fff; background: rgba(255,255,255,0.05); }
        .nav-item.active { color: #FF0056; background: rgba(255, 0, 86, 0.08); font-weight: 700; }
        .nav-item.active .nav-icon { color: #FF0056; }
        .nav-icon { width: 18px; text-align: center; font-size: 14px; color: #64748B; flex-shrink: 0; }

        .nav-badge { margin-left: auto; background: #FF0056; color: white; font-size: 10px; padding: 1px 7px; border-radius: 20px; font-weight: 700; }

        .sidebar-footer { margin-top: auto; padding: 16px; border-top: 1px solid #1E293B; }
        .user-card { display: flex; align-items: center; gap: 12px; }
        .user-avatar { width: 34px; height: 34px; border-radius: 8px; background: #FF0056; color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; flex-shrink: 0; }

        .main-content { margin-left: 240px; height: 100vh; display: flex; flex-direction: column; }
        .content-iframe { flex: 1; border: none; width: 100%; height: 100%; display: block; }

        /* Tooltip on hover for collapsed state */
        .nav-item-label { white-space: nowrap; overflow: hidden; }

        /* Active indicator */
        .nav-item.active::before { content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%); width: 3px; height: 20px; background: #FF0056; border-radius: 0 2px 2px 0; }
        .nav-item { position: relative; }

        /* Loading overlay */
        #loading-bar { position: fixed; top: 0; left: 240px; right: 0; height: 2px; background: #FF0056; z-index: 9999; transform: scaleX(0); transform-origin: left; transition: transform 0.3s ease; }
        #loading-bar.loading { transform: scaleX(0.7); transition: transform 0.8s ease; }
        #loading-bar.done { transform: scaleX(1); opacity: 0; transition: transform 0.2s ease, opacity 0.3s ease 0.2s; }
    </style>
</head>
<body class="flex">

    <div id="loading-bar"></div>

    <!-- ══════════ SIDEBAR ══════════ -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <h1>KITANA<span>.</span></h1>
        </div>

        <nav style="flex: 1; overflow-y: auto; padding: 8px 0;">

            <div class="nav-section">Ana Modüller</div>

            <button class="nav-item active" onclick="navigate('index.html', this)" id="nav-dashboard">
                <span class="nav-icon"><i class="fa-solid fa-chart-line"></i></span>
                <span class="nav-item-label">Genel Bakış</span>
            </button>

            <button class="nav-item" onclick="navigate('pos.html', this)" id="nav-pos">
                <span class="nav-icon"><i class="fa-solid fa-cash-register"></i></span>
                <span class="nav-item-label">POS Sistemi</span>
            </button>

            <div class="nav-section">Finans</div>

            <button class="nav-item" onclick="navigate('cari-hesap.html', this)" id="nav-cari">
                <span class="nav-icon"><i class="fa-solid fa-scale-balanced"></i></span>
                <span class="nav-item-label">Cari Hesap</span>
            </button>

            <button class="nav-item" onclick="navigate('z-raporu.html', this)" id="nav-zraporu">
                <span class="nav-icon"><i class="fa-solid fa-file-invoice-dollar"></i></span>
                <span class="nav-item-label">Z-Raporu</span>
            </button>

            <div class="nav-section">Fiyatlandırma</div>

            <button class="nav-item" onclick="navigate('dinamik-fiyatlandirma.html', this)" id="nav-dinamik">
                <span class="nav-icon"><i class="fa-solid fa-tags"></i></span>
                <span class="nav-item-label">Dinamik Fiyatlandırma</span>
            </button>

            <div class="nav-section">Diğer</div>

            <button class="nav-item" onclick="navigate('kitana-pitch.html', this)" id="nav-pitch">
                <span class="nav-icon"><i class="fa-solid fa-rocket"></i></span>
                <span class="nav-item-label">Platform Tanıtımı</span>
            </button>

        </nav>

        <div class="sidebar-footer">
            <div class="user-card">
                <div class="user-avatar">A</div>
                <div>
                    <p style="font-size: 12px; font-weight: 700; color: white; margin: 0;">Alsancak Şube</p>
                    <p style="font-size: 10px; color: #64748B; margin: 0;">Yönetici Girişi</p>
                </div>
            </div>
        </div>
    </aside>

    <!-- ══════════ CONTENT ══════════ -->
    <div class="main-content">
        <iframe id="content-frame" class="content-iframe" src="index.html" frameborder="0"></iframe>
    </div>

    <script>
        const frame = document.getElementById('content-frame');
        const loadingBar = document.getElementById('loading-bar');

        function navigate(page, btn) {
            // Update active state
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            btn.classList.add('active');

            // Loading bar animation
            loadingBar.className = 'loading';
            loadingBar.style.transform = '';
            void loadingBar.offsetWidth;

            frame.src = page;
        }

        frame.addEventListener('load', function() {
            loadingBar.className = 'done';
            setTimeout(() => { loadingBar.className = ''; }, 600);
        });
    </script>
</body>
</html>
