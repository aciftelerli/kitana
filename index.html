<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitana Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; width: 100%; overflow: hidden; font-family: 'Poppins', sans-serif; background: #0B1120; }

        .shell { display: flex; height: 100vh; width: 100vw; }

        /* Sidebar */
        .sidebar { width: 228px; flex-shrink: 0; background: #0B1120; display: flex; flex-direction: column; border-right: 1px solid rgba(255,255,255,0.05); height: 100vh; }

        .logo-row { height: 58px; display: flex; align-items: center; padding: 0 22px; border-bottom: 1px solid rgba(255,255,255,0.05); flex-shrink: 0; }
        .logo-row h1 { font-size: 1.15rem; font-weight: 800; letter-spacing: 0.22em; color: #fff; }
        .logo-row h1 span { color: #FF0056; }

        .nav-scroll { flex: 1; overflow-y: auto; padding: 6px 0; }
        .nav-scroll::-webkit-scrollbar { width: 0; }

        .nav-group-label { padding: 18px 18px 5px; font-size: 9px; font-weight: 700; color: #1e3050; text-transform: uppercase; letter-spacing: 0.14em; }

        .nav-btn { display: flex; align-items: center; gap: 10px; padding: 9px 14px 9px 16px; margin: 1px 8px; border-radius: 7px; color: #3d5470; font-size: 12.5px; font-weight: 500; cursor: pointer; border: none; background: none; width: calc(100% - 16px); text-align: left; position: relative; transition: color .15s, background .15s; }
        .nav-btn:hover { color: #7a9bb8; background: rgba(255,255,255,0.03); }
        .nav-btn.active { color: #fff; background: rgba(255,0,86,0.1); font-weight: 600; }
        .nav-btn.active::before { content: ''; position: absolute; left: -8px; top: 50%; transform: translateY(-50%); width: 3px; height: 16px; background: #FF0056; border-radius: 0 3px 3px 0; }
        .nav-btn .ni { width: 15px; text-align: center; font-size: 12px; flex-shrink: 0; }
        .nav-btn .badge { margin-left: auto; background: #FF0056; color: #fff; font-size: 9px; padding: 1px 6px; border-radius: 20px; font-weight: 700; }

        /* Bottom */
        .sidebar-bottom { border-top: 1px solid rgba(255,255,255,0.05); padding: 12px; flex-shrink: 0; }
        .user-row { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px; background: rgba(255,255,255,0.03); cursor: pointer; transition: background .15s; }
        .user-row:hover { background: rgba(255,255,255,0.06); }
        .avatar { width: 28px; height: 28px; border-radius: 7px; background: #FF0056; color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px; flex-shrink: 0; }
        .user-text { flex: 1; min-width: 0; }
        .user-text .name { font-size: 11.5px; font-weight: 600; color: #c8d8e8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .user-text .role { font-size: 9.5px; color: #2a3f58; }

        /* Notif */
        .notif-row { display: flex; align-items: center; gap: 10px; padding: 9px 14px 9px 16px; margin: 1px 8px; border-radius: 7px; cursor: pointer; transition: background .15s; }
        .notif-row:hover { background: rgba(255,255,255,0.03); }
        .notif-icon { position: relative; width: 15px; text-align: center; }
        .notif-icon i { font-size: 12px; color: #3d5470; }
        .notif-dot { position: absolute; top: -2px; right: -3px; width: 6px; height: 6px; background: #FF0056; border-radius: 50%; border: 2px solid #0B1120; }
        .notif-label { font-size: 12.5px; color: #3d5470; font-weight: 500; }
        .notif-count { margin-left: auto; font-size: 9px; color: #FF0056; font-weight: 700; }

        /* Content */
        .content-area { flex: 1; min-width: 0; height: 100vh; position: relative; overflow: hidden; background: #F5F7FA; }
        #frame { position: absolute; inset: 0; width: 100%; height: 100%; border: none; display: block; }

        /* Loading bar */
        #bar { position: absolute; top: 0; left: 0; right: 0; height: 2px; background: #FF0056; transform: scaleX(0); transform-origin: left; z-index: 9999; pointer-events: none; transition: none; }
        #bar.go { transform: scaleX(.8); transition: transform .7s ease; }
        #bar.done { transform: scaleX(1); opacity: 0; transition: transform .1s, opacity .4s .1s; }
    </style>
</head>
<body>
<div class="shell">
    <aside class="sidebar">
        <div class="logo-row"><h1>KITANA<span>.</span></h1></div>

        <nav class="nav-scroll">
            <div class="nav-group-label">Genel</div>
            <button class="nav-btn active" onclick="go('dashboard.html',this)">
                <span class="ni"><i class="fa-solid fa-chart-line"></i></span> Genel Bakış
            </button>
            <button class="nav-btn" onclick="go('siparis.html',this)">
                <span class="ni"><i class="fa-solid fa-basket-shopping"></i></span> Siparis Ver
                <span class="badge">3</span>
            </button>

            <div class="nav-group-label">Finans</div>
            <button class="nav-btn" onclick="go('cari-hesap.html',this)">
                <span class="ni"><i class="fa-solid fa-scale-balanced"></i></span> Cari Hesap
            </button>
            <button class="nav-btn" onclick="go('z-raporu.html',this)">
                <span class="ni"><i class="fa-solid fa-file-chart-column"></i></span> Z-Raporu
            </button>

            <div class="nav-group-label">Fiyatlandirma</div>
            <button class="nav-btn" onclick="go('dinamik-fiyatlandirma.html',this)">
                <span class="ni"><i class="fa-solid fa-tags"></i></span> Dinamik Fiyat
            </button>

            <div class="nav-group-label">Diger</div>
            <button class="nav-btn" onclick="go('kitana-pitch.html',this)">
                <span class="ni"><i class="fa-solid fa-presentation-screen"></i></span> Platform Tanitimi
            </button>

            <div class="notif-row">
                <div class="notif-icon"><i class="fa-regular fa-bell"></i><div class="notif-dot"></div></div>
                <span class="notif-label">Bildirimler</span>
                <span class="notif-count">3 yeni</span>
            </div>
        </nav>

        <div class="sidebar-bottom">
            <div class="user-row">
                <div class="avatar">A</div>
                <div class="user-text">
                    <div class="name">Alsancak Sube</div>
                    <div class="role">Yonetici</div>
                </div>
                <i class="fa-solid fa-chevron-right" style="color:#1e3050;font-size:10px;"></i>
            </div>
        </div>
    </aside>

    <div class="content-area">
        <div id="bar"></div>
        <iframe id="frame" src="dashboard.html" title="Kitana"></iframe>
    </div>
</div>
<script>
    const frame = document.getElementById('frame');
    const bar   = document.getElementById('bar');
    function go(page, btn) {
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        bar.className = '';
        void bar.offsetWidth;
        bar.className = 'go';
        frame.src = page;
    }
    frame.addEventListener('load', () => {
        bar.className = 'done';
        setTimeout(() => bar.className = '', 600);
    });
</script>
</body>
</html>
