<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KITANA. — Platform</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0B1120;
        }

        .shell {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* ─── Sidebar ─── */
        .sidebar {
            width: 220px;
            flex-shrink: 0;
            background: #0B1120;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #1a2535;
            height: 100vh;
        }

        .sidebar-logo {
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid #1a2535;
            flex-shrink: 0;
        }
        .sidebar-logo h1 {
            font-size: 1.25rem;
            font-weight: 900;
            letter-spacing: 0.2em;
            color: #fff;
        }
        .sidebar-logo h1 span { color: #FF0056; }

        .nav-body {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }
        .nav-body::-webkit-scrollbar { width: 3px; }
        .nav-body::-webkit-scrollbar-thumb { background: #1E293B; }

        .nav-section {
            padding: 14px 16px 4px;
            font-size: 9.5px;
            font-weight: 700;
            color: #2d3f55;
            text-transform: uppercase;
            letter-spacing: 0.12em;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 16px;
            margin: 1px 8px;
            border-radius: 7px;
            color: #4e6077;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.12s, color 0.12s;
            border: none;
            background: none;
            width: calc(100% - 16px);
            text-align: left;
            position: relative;
        }
        .nav-item:hover { color: #94A3B8; background: rgba(255,255,255,0.04); }
        .nav-item.active {
            color: #FF0056;
            background: rgba(255,0,86,0.08);
            font-weight: 600;
        }
        .nav-item.active::before {
            content: '';
            position: absolute;
            left: -8px; top: 50%;
            transform: translateY(-50%);
            width: 3px; height: 18px;
            background: #FF0056;
            border-radius: 0 2px 2px 0;
        }
        .nav-icon {
            width: 16px;
            text-align: center;
            font-size: 12.5px;
            flex-shrink: 0;
        }

        /* Notification row */
        .sidebar-notif {
            padding: 10px 16px;
            border-top: 1px solid #1a2535;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: background 0.12s;
            flex-shrink: 0;
        }
        .sidebar-notif:hover { background: rgba(255,255,255,0.03); }
        .notif-icon-wrap {
            position: relative;
            width: 30px; height: 30px;
            border-radius: 7px;
            background: #151f2e;
            display: flex; align-items: center; justify-content: center;
            color: #4e6077; font-size: 13px; flex-shrink: 0;
        }
        .notif-dot {
            position: absolute; top: 5px; right: 5px;
            width: 6px; height: 6px;
            background: #FF0056; border-radius: 50%;
            border: 2px solid #0B1120;
        }
        .notif-label { flex: 1; }
        .notif-label .title { font-size: 12px; color: #64748B; font-weight: 500; }
        .notif-label .sub { font-size: 10px; color: #2d3f55; }

        /* User footer */
        .sidebar-footer {
            padding: 10px 12px;
            border-top: 1px solid #1a2535;
            flex-shrink: 0;
        }
        .user-card {
            display: flex; align-items: center; gap: 9px;
            padding: 7px 10px; border-radius: 8px;
            background: #111b2b; cursor: pointer;
            transition: background 0.12s;
        }
        .user-card:hover { background: #1a2740; }
        .user-avatar {
            width: 28px; height: 28px; border-radius: 6px;
            background: #FF0056; color: #fff;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 12px; flex-shrink: 0;
        }
        .user-info { flex: 1; min-width: 0; }
        .user-info .name { font-size: 11.5px; font-weight: 700; color: #CBD5E1; }
        .user-info .role { font-size: 9.5px; color: #2d3f55; }
        .user-chev { color: #2d3f55; font-size: 10px; }

        /* ─── Content area ─── */
        .content-area {
            flex: 1;
            min-width: 0;
            height: 100vh;
            position: relative;
            overflow: hidden;
            background: #F8FAFC;
        }

        #content-frame {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* Loading bar */
        #progress {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: #FF0056;
            transform: scaleX(0);
            transform-origin: left;
            z-index: 9999;
            transition: none;
            pointer-events: none;
        }
        #progress.running {
            transform: scaleX(0.8);
            transition: transform 0.7s cubic-bezier(0.1,0.8,0.2,1);
        }
        #progress.finish {
            transform: scaleX(1);
            opacity: 0;
            transition: transform 0.15s ease, opacity 0.4s ease 0.1s;
        }
    </style>
</head>
<body>
<div class="shell">

    <!-- ════════ SIDEBAR ════════ -->
    <aside class="sidebar">

        <div class="sidebar-logo">
            <h1>KITANA<span>.</span></h1>
        </div>

        <nav class="nav-body">
            <div class="nav-section">Ana Modüller</div>

            <button class="nav-item active" onclick="go('dashboard.html', this)">
                <span class="nav-icon"><i class="fa-solid fa-chart-line"></i></span>
                Genel Bakış
            </button>
            <button class="nav-item" onclick="go('pos.html', this)">
                <span class="nav-icon"><i class="fa-solid fa-cash-register"></i></span>
                POS Sistemi
            </button>

            <div class="nav-section">Finans</div>

            <button class="nav-item" onclick="go('cari-hesap.html', this)">
                <span class="nav-icon"><i class="fa-solid fa-scale-balanced"></i></span>
                Cari Hesap
            </button>
            <button class="nav-item" onclick="go('z-raporu.html', this)">
                <span class="nav-icon"><i class="fa-solid fa-file-invoice-dollar"></i></span>
                Z-Raporu
            </button>

            <div class="nav-section">Fiyatlandırma</div>

            <button class="nav-item" onclick="go('dinamik-fiyatlandirma.html', this)">
                <span class="nav-icon"><i class="fa-solid fa-tags"></i></span>
                Dinamik Fiyatlandırma
            </button>

            <div class="nav-section">Diğer</div>

            <button class="nav-item" onclick="go('kitana-pitch.html', this)">
                <span class="nav-icon"><i class="fa-solid fa-rocket"></i></span>
                Platform Tanıtımı
            </button>
        </nav>

        <!-- Notifications -->
        <div class="sidebar-notif">
            <div class="notif-icon-wrap">
                <i class="fa-regular fa-bell"></i>
                <div class="notif-dot"></div>
            </div>
            <div class="notif-label">
                <div class="title">Bildirimler</div>
                <div class="sub">3 yeni uyarı</div>
            </div>
        </div>

        <!-- User -->
        <div class="sidebar-footer">
            <div class="user-card">
                <div class="user-avatar">A</div>
                <div class="user-info">
                    <div class="name">Alsancak Şube</div>
                    <div class="role">Yönetici Girişi</div>
                </div>
                <i class="fa-solid fa-chevron-right user-chev"></i>
            </div>
        </div>

    </aside>

    <!-- ════════ CONTENT ════════ -->
    <div class="content-area">
        <div id="progress"></div>
        <iframe id="content-frame" src="dashboard.html" title="Kitana"></iframe>
    </div>

</div>
<script>
    const frame = document.getElementById('content-frame');
    const bar   = document.getElementById('progress');

    function go(page, btn) {
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        btn.classList.add('active');
        bar.className = '';
        void bar.offsetWidth;
        bar.className = 'running';
        frame.src = page;
    }

    frame.addEventListener('load', () => {
        bar.className = 'finish';
        setTimeout(() => bar.className = '', 600);
    });
</script>
</body>
</html>
